name: RegMat Scanner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    concurrency:
      group: scanner
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install slack-sdk

      - name: Run scanner
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_REFRESH_TOKEN: ${{ secrets.SLACK_REFRESH_TOKEN }}
        run: python scan.py

      - name: Update secrets if token was refreshed
        if: hashFiles('tokens_updated.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_ACCESS=$(python -c "import json; print(json.load(open('tokens_updated.json'))['access_token'])")
          NEW_REFRESH=$(python -c "import json; print(json.load(open('tokens_updated.json'))['refresh_token'])")
          gh secret set SLACK_TOKEN --repo ${{ github.repository }} --body "$NEW_ACCESS"
          gh secret set SLACK_REFRESH_TOKEN --repo ${{ github.repository }} --body "$NEW_REFRESH"
          rm tokens_updated.json
          echo "Secrets updated with refreshed tokens"

      - name: Commit and push data
        run: |
          git config user.name "regmat-bot"
          git config user.email "regmat-bot@users.noreply.github.com"
          git add data.json
          git commit -m "scan $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push || true
