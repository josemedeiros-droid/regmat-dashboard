name: RegMat Scanner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install slack-sdk

      - name: Run scanner
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: python scan.py

      - name: Commit and push
        run: |
          git config user.name "regmat-bot"
          git config user.email "regmat-bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
